name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Run performance regression guards
        run: flutter test benchmark/performance_guard_test.dart

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Run example tests
        run: flutter test
        working-directory: example

      - name: Build example for web release
        run: flutter build web --release
        working-directory: example
